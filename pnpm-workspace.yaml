packages:
  - '**'
# pnpm 11 removed onlyBuiltDependencies in favour of allowBuilds, and skips every
# dependency build script unless it's explicitly allowed here. Only Prisma's query
# engine actually needs its postinstall; everything else (esbuild/sharp/cypress/
# swc/parcel-watcher) is dev/test tooling we don't build. strictDepBuilds:false
# downgrades "unreviewed build script" from a hard error to a warning, so an
# unlisted dep can never fail the Forge deploy.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
strictDepBuilds: false
